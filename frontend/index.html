<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <link rel="stylesheet" href="./app.css">
    <script type="module" src="./app.js"></script>
</head>

<body class="bg-gray-100" x-data="{ mode: 'loading', messages: [], currentMessage: null, bodyMode: 'text', error: '' }"
    @messagesloaded.window="mode = 'messages-list'; messages = $event.detail.messages"
    @messageloaded.window="mode = 'view-message'; currentMessage.textBody = $event.detail.textBody; currentMessage.htmlBody = $event.detail.htmlBody; currentMessage.attachments = $event.detail.attachments"
    @erroroccurred.window="mode = 'error'; error = $event.detail.error;">
    <div class="container mx-auto p-4">
        <div class="bg-white shadow-md">
            <template x-if="mode === 'loading'">
                <div class="flex justify-center p-4">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600"></i>
                    <span class="sr-only">Loading...</span>
                </div>
            </template>
            <template x-if="mode === 'error'">
                <div class="p-4 text-red-600 text-center">
                    <div>Error occurred: <span x-text="error"></span></div>
                </div>
            </template>
            <template x-if="mode === 'messages-list'">
                <div>
                    <div class="grid grid-cols-4 gap-4 p-4 font-bold bg-gray-200">
                        <div>Sender</div>
                        <div class="col-span-2">Subject</div>
                        <div>Date</div>
                    </div>

                    <template x-if="messages.length === 0">
                        <div class="p-4 text-center">
                            No messages found
                        </div>
                    </template>

                    <template x-for="message in messages">
                        <div class="grid grid-cols-4 gap-4 p-4 hover:bg-gray-50 cursor-pointer"
                            @click="$dispatch('openmessage', message.id); currentMessage = message; bodyMode = 'text'; mode = 'loading'; currentMessage.is_read = true;">
                            <div class="overflow-hidden overflow-ellipsis text-nowrap">
                                <span :class="message.is_read ? '' : 'font-semibold'"
                                    x-text="message.from_name || message.from_email"></span>
                            </div>
                            <div class="col-span-2 overflow-hidden overflow-ellipsis text-nowrap">
                                <span :class="message.is_read ? '' : 'font-semibold'"
                                    x-text="message.subject || '(No subject)'"></span>
                            </div>
                            <div class="overflow-hidden overflow-ellipsis text-nowrap">
                                <span :class="message.is_read ? '' : 'font-semibold'" x-text="message.sent_at"></span>
                            </div>
                        </div>
                    </template>

                    <div class="grid grid-cols-2 p-4 bg-gray-200">
                        <div class="x-cloak font-bold">
                            Page <span x-text="$store.page"></span> of <span x-text="$store.pages"></span>
                        </div>
                        <div class="col-span-1 flex justify-end x-cloak">
                            <div :class="'text-white bg-gray-600 hover:bg-gray-500 border-2 rounded-md px-2 mr-2 ' + ($store.page === 1 ? 'opacity-50 cursor-not-allowed ' : 'cursor-pointer')"
                                @click="if ($store.page > 1) { $store.page--; $dispatch('loadmessages', $store.page); }">
                                <i class="fa-solid fa-chevron-left"></i>
                            </div>
                            <div :class="'text-white bg-gray-600 hover:bg-gray-500 border-2 rounded-md px-2 mr-2 ' + ($store.page === $store.pages ? 'opacity-50 cursor-not-allowed ' : 'cursor-pointer')"
                                @click="if ($store.page < $store.pages) { $store.page++; $dispatch('loadmessages', $store.page); }">
                                <i class="fa-solid fa-chevron-right"></i>
                            </div>
                            <div class="text-white bg-green-600 hover:bg-green-500 border-2 rounded-md px-2 mr-2 cursor-pointer"
                                @click="mode = 'loading'; $dispatch('loadmessages', $store.page);">
                                <i class="fa-solid fa-rotate-right"></i>
                            </div>
                            <div :class="'text-white bg-red-500 hover:bg-red-400 border-2 rounded-md px-2 ' + (messages.length === 0 ? 'opacity-50 cursor-not-allowed ' : 'cursor-pointer')"
                                @click="if (confirm('Are you sure you want to delete all messages?')) { mode = 'loading'; $dispatch('deletemessages'); }">
                                <i class="fa-solid fa-trash"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
            <template x-if="mode === 'view-message'">
                <div>
                    <div class="flex justify-between p-4">
                        <span x-text="currentMessage.subject || '(No subject)'"></span>
                        <div class="select-none text-xs border-0 rounded-md px-2 flex items-center bg-red-500 hover:bg-red-400 text-white cursor-pointer"
                            @click="mode = 'messages-list'">
                            <i class="fa-solid fa-xmark"></i>
                        </div>
                    </div>
                    <template x-if="currentMessage">
                        <div>
                            <div class="grid grid-cols-4 p-4">
                                <div class="font-bold">From:</div>
                                <div class="col-span-3"
                                    x-text="$store.g.nameAndEmail(currentMessage.from_name, currentMessage.from_email)">
                                </div>
                                <div class="font-bold">To:</div>
                                <div class="col-span-3"
                                    x-text="currentMessage.addresses.to.map(({ name, address }) => $store.g.nameAndEmail(name, address)).join(', ')">
                                </div>
                                <template x-if="currentMessage.addresses.cc.length > 0">
                                    <div class="font-bold">Cc:</div>
                                </template>
                                <template x-if="currentMessage.addresses.cc.length > 0">
                                    <div class="col-span-3"
                                        x-text="currentMessage.addresses.cc.map(({ name, address }) => $store.g.nameAndEmail(name, address)).join(', ')">
                                    </div>
                                </template>
                                <template x-if="currentMessage.addresses.bcc.length > 0">
                                    <div class="font-bold">Bcc:</div>
                                </template>
                                <template x-if="currentMessage.addresses.bcc.length > 0">
                                    <div class="col-span-3"
                                        x-text="currentMessage.addresses.bcc.map(({ name, address }) => $store.g.nameAndEmail(name, address)).join(', ')">
                                    </div>
                                </template>
                            </div>
                            <div class="px-4 flex gap-2 border-b">
                                <button class="px-3 py-1 rounded-t-md border border-b-0"
                                    :class="bodyMode === 'text' ? 'bg-white font-semibold' : 'bg-gray-100 text-gray-600'"
                                    @click="bodyMode = 'text'">
                                    Text
                                </button>
                                <button class="px-3 py-1 rounded-t-md border border-b-0"
                                    :class="bodyMode === 'html' ? 'bg-white font-semibold' : 'bg-gray-100 text-gray-600'"
                                    @click="bodyMode = 'html'">
                                    HTML
                                </button>
                            </div>
                            <template x-if="bodyMode === 'text'">
                                <pre class="p-4 font-mono whitespace-pre-wrap break-words"
                                    x-html="currentMessage.textBody"></pre>
                            </template>
                            <template x-if="bodyMode === 'html'">
                                <iframe class="w-full min-h-96 p-4" :srcdoc="currentMessage.htmlBody"></iframe>
                            </template>
                            <template x-if="currentMessage.attachments.length > 0">
                                <div class="p-4">
                                    <div class="font-bold">Attachments</div>
                                    <template x-for="attachment in currentMessage.attachments">
                                        <a :href="'/web/api/messages/' + currentMessage.id + '/attachments/' + attachment.id + '/download'"
                                            target="_blank" class="block text-blue-500 hover:underline"
                                            x-text="attachment.filename || '(Unnamed attachment)'"></a>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>
        </div>
    </div>
</body>

</html>
